c.textContent=`Dear 22,

今天，想送给你一封信。

没有盛大的烟火，
只有一些安静的话。

愿你依然相信远方，
也依然保留温柔。

慢一点，也很好。

愿未来所有平凡的日子，
都藏着一点惊喜。

生日快乐。

—— Forever for 22`;
